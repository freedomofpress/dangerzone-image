name: Tests
on:
  pull_request:
    paths:
      - Dockerfile
      - build-image.py
      - src/*
  push:
    branches:
      - main
      - "test/**"
    paths:
      - Dockerfile
      - build-image.py
      - src/*
  schedule:
    - cron: "2 0 * * *" # Run every day at 02:00 UTC.
  workflow_dispatch:

jobs:
  tests:
    name: Run tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Cache container image
        id: cache-container-image
        uses: actions/cache@v5
        with:
          key: v5-${{ steps.date.outputs.date }}-${{ hashFiles('Dockerfile', 'conversion/*.py', 'container_helpers/*', 'build-image.py') }}
          path: |
            container.tar
            image-id.txt

      - name: Build Dangerzone image
        if: ${{ steps.cache-container-image.outputs.cache-hit != 'true' }}
        run: |
          python3 build-image.py -d ${{ steps.date.outputs.date }}

      - name: Load local image for tests
        run: |
          podman load -i container.tar
          cp image-id.txt tests/share/image-id.txt

      - name: Install dependencies
        run: uv venv && uv pip install -e ".[dev]"

      - name: Run tests
        run: uv run pytest
