name: Tests
on:
  pull_request:
    paths:
      - Dockerfile
      - build-image.py
      - src/**
  push:
    branches:
      - main
      - "test/**"
    paths:
      - Dockerfile
      - build-image.py
      - src/**
  schedule:
    - cron: "2 0 * * *" # Run every day at 02:00 UTC.
  workflow_dispatch:

jobs:
  lint:
    name: Lint (ruff + ty)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install dependencies
        run: uv venv && uv pip install -e ".[dev]"

      - name: Run ruff
        run: uv run ruff check

      - name: Run ty
        run: uv run ty check

  tests:
    name: Run tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Cache container image
        id: cache-container-image
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          key: v5-${{ steps.date.outputs.date }}-${{ hashFiles('Dockerfile', 'conversion/*.py', 'container_helpers/*', 'build-image.py') }}
          path: |
            container.tar
            image-id.txt

      - name: Build Dangerzone image
        if: ${{ steps.cache-container-image.outputs.cache-hit != 'true' }}
        run: |
          python3 build-image.py -d ${{ steps.date.outputs.date }}

      - name: Load local image for tests
        run: |
          podman load -i container.tar
          cp image-id.txt tests/share/image-id.txt

      - name: Install dependencies
        run: uv venv && uv pip install -e ".[dev]"

      - name: Run tests
        run: uv run pytest
